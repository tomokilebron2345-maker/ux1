<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4: クイズ - アジャイル + リーン + パーパス</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,.2);
            overflow: hidden;
        }

        /* ─── Header ─── */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px;
            text-align: center;
        }

        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p  { opacity: .9; font-size: 1.1em; }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            transition: background 0.3s;
        }
        .back-link:hover { background: rgba(255,255,255,0.3); }

        /* ─── Progress ─── */
        .progress {
            background: #e0e0e0;
            height: 6px;
            margin: 20px 0;
        }

        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: .3s ease;
            width: 0%;
        }

        /* ─── Content ─── */
        .content { padding: 40px; }

        /* ─── Quiz Question ─── */
        .quiz-question {
            margin-bottom: 30px;
            animation: fadeIn .5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* ─── Options ─── */
        .options { display: grid; gap: 12px; }

        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: .3s ease;
            background: #f9f9f9;
        }

        .option:hover     { border-color: #667eea; background: #f0f4ff; }
        .option.selected  { border-color: #667eea; background: #e8eeff; }
        .option.correct   { border-color: #10b981; background: #d1fae5; }
        .option.incorrect { border-color: #ef4444; background: #fee2e2; }

        .option input {
            margin-right: 10px;
            cursor: pointer;
            accent-color: #667eea;
        }

        /* ─── Explanation ─── */
        .explanation {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: slideDown .3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .explanation p { color: #666; line-height: 1.8; }

        /* ─── Correct Feedback Badge ─── */
        .correct-feedback {
            background: #d1fae5;
            border: 2px solid #10b981;
            color: #059669;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            animation: slideDown .3s ease-out;
        }

        /* ─── Buttons ─── */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: .3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,.4);
        }

        .btn-next {
            background: #10b981;
            color: #fff;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16,185,129,.4);
        }

        /* ─── Score Section ─── */
        .score-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            display: none;
        }

        .score-section.show {
            display: block;
            animation: slideUp .5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .score-title   { font-size: 1.8em; margin-bottom: 10px; }
        .score-number  { font-size: 4em; font-weight: bold; margin: 15px 0; }
        .score-message { font-size: 1.3em; margin-top: 15px; line-height: 1.8; white-space: pre-line; }

        /* ─── Nav Buttons ─── */
        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: .3s ease;
        }

        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16,185,129,.4);
        }

        /* ─── Footer ─── */
        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e0e0e0;
        }

        /* ─── Responsive ─── */
        @media (max-width: 600px) {
            .content        { padding: 20px; }
            .header h1      { font-size: 1.5em; }
            .question-text  { font-size: 1.1em; }
            .score-number   { font-size: 3em; }
        }
    </style>
</head>

    <div class="header">

        <div class="progress-bar" id="progressBar"></div>

    <!-- ══════════ CONTENT ══════════ -->

        <!-- Score Section -->
        <div class="score-section" id="scoreSection">
            <div class="score-title">クイズ完了！🎉</div>

            <div class="score-message" id="scoreMessage"></div>

        <!-- Quiz Content -->
        <div id="quizContent"></div>

</div><!-- /container -->

<script>
/* ═══════════════════════════════════════
   QUIZ DATA  (12問)
═══════════════════════════════════════ */
const quizData = [
    {
        question: "アジャイル開発とウォーターフォール型の最も大きな違いは何ですか？",
        options: [
            { text: "ウォーターフォール型の方が新しい技術である",                                correct: false },
            { text: "ウォーターフォール型は全要件を最初に決め、アジャイルは段階的に改善する",  correct: true  },
            { text: "アジャイルはテストが不要である",                                            correct: false },
            { text: "ウォーターフォール型の方が失敗しにくい",                                    correct: false }
        ],
        explanation: "ウォーターフォール型は計画 → 設計 → 実装 → テスト → リリースと順序立って進み、変更が困難です。一方アジャイルはスプリントサイクルで段階的に改善し、変化に柔軟に対応します。"
    },
    {
        question: "スクラムにおけるスプリントとは何ですか？",
        options: [
            { text: "プロジェクト全体の期間",                                                          correct: false },
            { text: "1〜4週間の固定サイクル。この期間で計画・実装・レビュー・改善を完結させる",         correct: true  },
            { text: "テスト段階のこと",                                                                correct: false },
            { text: "リリース後のサポート期間",                                                        correct: false }
        ],
        explanation: "スプリントはアジャイル開発の基本単位です。短い期間で計画から実装・テスト・レビューまでを完結させ、各スプリント終了時には動作するソフトウェアが生まれます。"
    },
    {
        question: "スクラムの4つの儀式のうち、「スプリント終了後にチームの改善点を振り返る」ために行うものはどれですか？",
        options: [
            { text: "スプリント計画",         correct: false },
            { text: "デイリースタンドアップ", correct: false },
            { text: "スプリントレビュー",     correct: false },
            { text: "レトロスペクティブ",     correct: true  }
        ],
        explanation: "レトロスペクティブはスプリント終了後に行う振り返り会議です。「何がうまくいったか」「何を改善すべきか」をチームで議論し、次のスプリントに活かします。スプリントレビューはステークホルダーへの成果発表です。"
    },
    {
        question: "アジャイル開発が必要とされる背景として最も適切なものはどれですか？",
        options: [
            { text: "コストをできるだけ削減したい場合",                               correct: false },
            { text: "市場環境が急速に変化し、ユーザーニーズが多様化している場合",     correct: true  },
            { text: "チームのサイズが小さい場合のみ",                                 correct: false },
            { text: "テクノロジーが古い場合",                                          correct: false }
        ],
        explanation: "アジャイルは変化する要件に対応できることが特徴です。市場環境の急速な変化やユーザーニーズの多様化に対応する必要がある現代において特に有効な手法です。"
    },
    {
        question: "リーン開発の基本概念として最も正しいものはどれですか？",
        options: [
            { text: "最新の技術を最大限に活用すること",                                                                   correct: false },
            { text: "顧客が本当に望む価値に焦点を当てながら、開発プロセスの無駄を排除し、効率的に製品・サービスを提供すること", correct: true  },
            { text: "できるだけ多くの機能を持つ製品を作ること",                                                           correct: false },
            { text: "最初から完璧な製品を目指すこと",                                                                     correct: false }
        ],
        explanation: "リーン開発はトヨタ生産方式から着想を得た手法です。顧客価値を最大化しながら、開発プロセスの無駄を徹底的に排除することを目指します。"
    },
    {
        question: "MVP（最小実行可能製品）とは何ですか？",
        options: [
            { text: "市場で最も売上が大きい製品",                                         correct: false },
            { text: "最小限の機能で、ユーザーのニーズを満たし、フィードバックを得られる製品", correct: true  },
            { text: "最新の技術を使った製品",                                             correct: false },
            { text: "最も低価格の製品",                                                   correct: false }
        ],
        explanation: "MVPは必要最小限の機能を持ちながらユーザーからフィードバックを得るために作られる製品です。完璧さより素早いリリースと学習を優先するリーン思考の核心です。"
    },
    {
        question: "リーンスタートアップにおける「ピボット」とは何ですか？",
        options: [
            { text: "ビジネスに大成功すること",                               correct: false },
            { text: "仮説が間違っていた時に、戦略や方向性を根本的に変えること", correct: true  },
            { text: "製品に小さな改善を加えること",                           correct: false },
            { text: "ユーザーのニーズを無視して独自の方向に進むこと",         correct: false }
        ],
        explanation: "ピボットはデータや測定結果から仮説が誤りだと判断した際に、方向を根本的に変えることです。失敗ではなく学習の結果の意思決定であり、InstagramやTwitterもピボットを経て成功しています。"
    },
    {
        question: "Build-Measure-Learn サイクルの正しい順序はどれですか？",
        options: [
            { text: "Learn → Build → Measure", correct: false },
            { text: "Measure → Learn → Build", correct: false },
            { text: "Build → Measure → Learn", correct: true  },
            { text: "Learn → Measure → Build", correct: false }
        ],
        explanation: "リーンスタートアップでは「Build（MVPを作る）→ Measure（ユーザー反応を測定する）→ Learn（仮説を検証し次の行動を決める）」というサイクルを高速で回すことが重要です。"
    },
    {
        question: "パーパス（企業の存在意義）の定義として最も正しいものはどれですか？",
        options: [
            { text: "企業の短期的な利益目標",                                                                 correct: false },
            { text: "企業が営利活動を通じて社会に実現したい価値や、解決したい社会課題。企業の存在意義そのもの", correct: true  },
            { text: "製品の機能仕様",                                                                         correct: false },
            { text: "社員の給与を決めるための指標",                                                          correct: false }
        ],
        explanation: "パーパスは単なる利益追求ではなく、企業が社会に対して果たす根本的な目的や役割を指します。ミッション・ビジョン・バリューの3層によって構成されます。"
    },
    {
        question: "パーパスの3層構造（ミッション・ビジョン・バリュー）の正しい説明はどれですか？",
        options: [
            { text: "3つは同じ意味である",                                                  correct: false },
            { text: "ミッション：何をするか　ビジョン：どうなりたいか　バリュー：いかにして行動するか", correct: true  },
            { text: "ビジョンが最も重要で、ミッションとバリューは副次的",                  correct: false },
            { text: "この3つは業種によって定義が異なる",                                    correct: false }
        ],
        explanation: "ミッションは現在の活動内容、ビジョンは将来のあるべき姿、バリューは大切にする原則や姿勢を示します。この3層が揃って企業のパーパスが形成されます。"
    },
    {
        question: "企業経営にパーパスが必要とされる理由として挙げられていないものはどれですか？",
        options: [
            { text: "社員のモチベーション向上",   correct: false },
            { text: "顧客ロイヤルティの向上",     correct: false },
            { text: "税金の削減",                 correct: true  },
            { text: "人材採用と育成の差別化",     correct: false }
        ],
        explanation: "パーパスが重要な理由は、社員のモチベーション向上、顧客ロイヤルティ向上、人材採用・育成の差別化、社会への説明責任、持続可能な経営基盤の構築などです。税金削減とは直接関係しません。"
    },
    {
        question: "UXとパーパスの関係として最も適切なものはどれですか？",
        options: [
            { text: "UXはパーパスとは関係なく、単純に使いやすさだけを追求すべき",                                                    correct: false },
            { text: "優れたUXは企業のパーパスを実現する手段。企業理念がUX設計に反映されることで、ユーザーにとって意味のある体験が生まれる", correct: true  },
            { text: "パーパスがあるとUX設計の自由度が制限される",                                                                    correct: false },
            { text: "大企業だけがパーパスとUXを統合する必要がある",                                                                  correct: false }
        ],
        explanation: "企業のパーパスが明確であれば、新機能の優先順位・デザイン決定・満足度の測定基準がすべてパーパスに基づき、一貫性のある意味ある体験が実現されます。"
    }
];

/* ═══════════════════════════════════════
   ENGINE
═══════════════════════════════════════ */
function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

let currentQuestion = 0;
let score = 0;
let correctAnswers = [];   // シャッフル後の正解インデックスを保持

/* ── 問題を描画 ── */
function renderQuestion() {
    if (currentQuestion >= quizData.length) { showScore(); return; }

    const q  = quizData[currentQuestion];
    const shuffled = shuffleArray([...q.options]);

    // シャッフル後の正解インデックスを記録
    correctAnswers[currentQuestion] = shuffled.findIndex(o => o.correct);

    const container = document.getElementById('quizContent');
    container.innerHTML = `
        <div class="quiz-question">
            <div class="question-text">Q${currentQuestion + 1}/${quizData.length}: ${q.question}</div>
            <div class="options" id="options"></div>
            <div class="explanation" id="explanation">
                <p id="explanationText"></p>
            </div>
            <div class="buttons">
                <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">回答する</button>
            </div>
        </div>`;

    const optionsEl = document.getElementById('options');
    shuffled.forEach((opt, idx) => {
        const label = document.createElement('label');
        label.className = 'option';
        label.innerHTML = `<input type="radio" name="answer" value="${idx}"> ${opt.text}`;
        label.addEventListener('click', () => {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            label.classList.add('selected');
        });
        optionsEl.appendChild(label);
    });

    updateProgress();
}

/* ── 回答を判定 ── */
function submitAnswer() {
    const selected = document.querySelector('input[name="answer"]:checked');
    if (!selected) { alert('選択肢を選んでください'); return; }

    const answerIdx = parseInt(selected.value);
    const isCorrect = answerIdx === correctAnswers[currentQuestion];
    if (isCorrect) score++;

    // 選択肢の色付け
    document.querySelectorAll('.option').forEach((el, idx) => {
        el.classList.remove('selected');
        if (idx === correctAnswers[currentQuestion]) {
            el.classList.add('correct');
        } else if (idx === answerIdx && !isCorrect) {
            el.classList.add('incorrect');
        }
        // ラジオボタンを無効化
        const radio = el.querySelector('input');
        if (radio) radio.disabled = true;
    });

    // 解説表示
    document.getElementById('explanation').classList.add('show');
    document.getElementById('explanationText').textContent = quizData[currentQuestion].explanation;

    // 正解バッジ
    if (isCorrect) {
        const badge = document.createElement('div');
        badge.className = 'correct-feedback';
        badge.innerHTML = '✅ 正解です！';
        document.querySelector('.quiz-question').appendChild(badge);
    }

    // 回答ボタンを次へボタンに差し替え
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.style.display = 'none';

    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-next';
    nextBtn.textContent = currentQuestion === quizData.length - 1 ? '結果を見る' : '次の問題へ';
    nextBtn.onclick = () => { currentQuestion++; renderQuestion(); };
    document.querySelector('.buttons').appendChild(nextBtn);
}

/* ── プログレスバー更新 ── */
function updateProgress() {
    const pct = ((currentQuestion + 1) / quizData.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
}

/* ── スコア画面 ── */
function showScore() {
    document.getElementById('quizContent').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';

    const pct = Math.round((score / quizData.length) * 100);
    document.getElementById('scoreNumber').textContent = pct + '%';

    let msg = '';
    if (pct === 100) {
        msg = '🎉 完璧です！\nアジャイル・リーン・パーパスをすべて理解しています！\n素晴らしい理解度です。';
    } else if (pct >= 80) {
        msg = '✨ 素晴らしい！\nほぼ理解できています。\nW5に進む準備ができました。';
    } else if (pct >= 60) {
        msg = '👍 良好です！\n基本は理解できています。\n資料をもう一度確認してからW5に進みましょう。';
    } else {
        msg = '📚 もう一度挑戦！\nW4の資料を確認してから\nもう一度クイズに挑戦してください。';
    }
    document.getElementById('scoreMessage').textContent = msg;

    const navEl = document.getElementById('navButtons');
    navEl.innerHTML = '';

    const makeLink = (href, text) => {
        const a = document.createElement('a');
        a.className = 'nav-link';
        a.href = href;
        a.textContent = text;
        return a;
    };

    const makeRestart = () => {
        const btn = document.createElement('button');
        btn.className = 'btn-next';
        btn.style.background = 'linear-gradient(135deg, #f97316 0%, #ea580c 100%)';
        btn.textContent = '🔄 もう一度挑戦';
        btn.onclick = () => location.reload();
        return btn;
    };

    if (pct === 100) {
        navEl.appendChild(makeLink('w5_ux.html',  '✅ W5へ進む'));
        navEl.appendChild(makeLink('index.html',  '🏠 トップに戻る'));
    } else if (pct >= 80) {
        navEl.appendChild(makeLink('w5_ux.html',  '✅ W5へ進む'));
        navEl.appendChild(makeLink('w4_ux.html',  '📖 資料を確認'));
        navEl.appendChild(makeRestart());
        navEl.appendChild(makeLink('index.html',  '🏠 トップに戻る'));
    } else {
        navEl.appendChild(makeLink('w4_ux.html',  '📖 資料を確認'));
        navEl.appendChild(makeRestart());
        navEl.appendChild(makeLink('index.html',  '🏠 トップに戻る'));
    }

    document.getElementById('scoreSection').classList.add('show');
}

renderQuestion();
