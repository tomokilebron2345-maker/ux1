<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W6: クイズ - UXリサーチ + ユーザー理解</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,.2);
            overflow: hidden;
        }

        /* ─── Header ─── */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px;
            text-align: center;
        }

        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p  { opacity: .9; font-size: 1.1em; }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            transition: background 0.3s;
        }
        .back-link:hover { background: rgba(255,255,255,0.3); }

        /* ─── Progress ─── */
        .progress {
            background: #e0e0e0;
            height: 6px;
            margin: 20px 0;
        }

        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: .3s ease;
            width: 0%;
        }

        /* ─── Content ─── */
        .content { padding: 40px; }

        /* ─── Quiz Question ─── */
        .quiz-question {
            margin-bottom: 30px;
            animation: fadeIn .5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* ─── Options ─── */
        .options { display: grid; gap: 12px; }

        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: .3s ease;
            background: #f9f9f9;
        }

        .option:hover     { border-color: #667eea; background: #f0f4ff; }
        .option.selected  { border-color: #667eea; background: #e8eeff; }
        .option.correct   { border-color: #10b981; background: #d1fae5; }
        .option.incorrect { border-color: #ef4444; background: #fee2e2; }

        .option input {
            margin-right: 10px;
            cursor: pointer;
            accent-color: #667eea;
        }

        /* ─── Explanation ─── */
        .explanation {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: slideDown .3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .explanation p { color: #666; line-height: 1.8; }

        /* ─── Correct Feedback Badge ─── */
        .correct-feedback {
            background: #d1fae5;
            border: 2px solid #10b981;
            color: #059669;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            animation: slideDown .3s ease-out;
        }

        /* ─── Buttons ─── */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: .3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,.4);
        }

        .btn-next {
            background: #10b981;
            color: #fff;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16,185,129,.4);
        }

        /* ─── Score Section ─── */
        .score-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            display: none;
        }

        .score-section.show {
            display: block;
            animation: slideUp .5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .score-title   { font-size: 1.8em; margin-bottom: 10px; }
        .score-number  { font-size: 4em; font-weight: bold; margin: 15px 0; }
        .score-message { font-size: 1.3em; margin-top: 15px; line-height: 1.8; white-space: pre-line; }

        /* ─── Nav Buttons ─── */
        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: .3s ease;
        }

        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16,185,129,.4);
        }

        /* ─── Footer ─── */
        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e0e0e0;
        }

        /* ─── Responsive ─── */
        @media (max-width: 600px) {
            .content       { padding: 20px; }
            .header h1     { font-size: 1.5em; }
            .question-text { font-size: 1.1em; }
            .score-number  { font-size: 3em; }
        }
    </style>
</head>

<script>
/* ═══════════════════════════════════════
   QUIZ DATA  (14問)
═══════════════════════════════════════ */
const quizData = [
    {
        question: "UXリサーチの定義として最も正しいのはどれですか？",

    {
        question: "定量調査と定性調査の違いについて、最も正しいのはどれですか？",
        options: [
            { text: "定量調査は『何か、どのくらいか』を把握し、定性調査は『なぜか』を理解する", correct: true  },

        question: "定量調査の主要な手法として挙げられていないのはどれですか？",
        options: [
            { text: "アンケート調査",         correct: false },
            { text: "クロス集計",             correct: false },
            { text: "フィールドワーク観察",   correct: true  },
            { text: "A/Bテスト",              correct: false }

        explanation: "定量調査は数字で分析できる手法です。アンケート、クロス集計、A/Bテストなどが含まれ、フィールドワーク観察は定性調査に該当します。"

        question: "定性調査の『エスノグラフィー』について、最も正しいのはどれですか？",
        options: [
            { text: "複数のユーザーを集めてグループディスカッションすること",                         correct: false },
            { text: "長期間にわたってユーザーの生活や行動を詳細に観察・記録する文化人類学的なアプローチ", correct: true  },
            { text: "ユーザーに日記を書かせる方法",                                                   correct: false },

    },
    {
        question: "行動データ分析における『行動ギャップ』とは何ですか？",
        options: [
            { text: "ユーザーが複数の行動を同時にしている状態",     correct: false },
            { text: "ユーザーの『言ったこと』と『実際にしたこと』の乖離", correct: true  },
            { text: "ページ間のリンク構造の不備",                   correct: false },
            { text: "ユーザーが作業を中断する箇所",                 correct: false }

    },

        options: [
            { text: "ペインポイントはユーザーが困っている箇所、ゲインポイントはユーザーが満足している箇所", correct: true  },
            { text: "ペインポイントは全員が感じるもので、ゲインポイントは個人差がある",                   correct: false },

        explanation: "ペルソナはリサーチ結果から創造された架空のユーザー代表です。年齢、職業、ニーズ、行動パターンなど詳細に記述され、設計チーム全体で共有される設計判断の指針となります。"

        question: "カスタマージャーニーマップの主要な構成要素として挙げられていないのはどれですか？",

        ],
        explanation: "カスタマージャーニーマップには、時系列、ユーザーの行動、感情、タッチポイント、課題、機会などが含まれます。競合企業の戦略は通常含まれません。"
    },
    {
        question: "エンパシーマップの目的として最も正しいのはどれですか？",
        options: [
            { text: "ユーザーの行動ログを分析すること",                                                                                                         correct: false },
            { text: "ペルソナが『見ているもの』『聞いているもの』『話しているもの』『思っていること』『感じていること』などを可視化し、深い共感を生み出すこと", correct: true  },
            { text: "ユーザーのスキルレベルを評価すること",                                                                                                     correct: false },

        explanation: "エンパシーマップは、ペルソナの見ている世界・聞いている情報・話している内容・考えていること・感じていることを可視化し、ユーザーへの深い共感を生み出すツールです。"
    },
    {
        question: "ユーザーストーリーの形式として最も正しいのはどれですか？",
        options: [
            { text: "『ユーザーとして、私は○○したい。なぜなら△△だから』という形で要求を言語化", correct: true  },
            { text: "『システムは○○を実現すべき』という形で技術要件を記述",                   correct: false },
            { text: "『ユーザーは○○と言った』という形でユーザーの発言を記録",                 correct: false },
            { text: "『競合は○○を提供している』という形で競合分析する",                       correct: false }
        ],
        explanation: "ユーザーストーリーは『ユーザーとして、私は○○したい。なぜなら△△だから』という形式で、ユーザー視点から要求を言語化します。ユーザーの動機も一緒に記録されます。"
    },
    {
        question: "バリュープロポジションとは何ですか？",
        options: [
            { text: "製品の機能一覧",                                         correct: false },
            { text: "ユーザーが達成したい目標と、企業が提供する価値の交点", correct: true  },
            { text: "ユーザーの行動パターン",                                 correct: false },
            { text: "製品の価格設定",                                         correct: false }
        ],
        explanation: "バリュープロポジションは、『ユーザーが達成したい目標』と『企業が提供する価値』が交わる点です。ユーザーにとって本当に意味のある価値提供を明確にできます。"
    },
    {
        question: "AS-IS分析とTO-BE分析について、最も正しいのはどれですか？",
        options: [
            { text: "AS-ISは現在、TO-BEは理想の利用状況を分析する",         correct: true  },
            { text: "AS-ISは過去、TO-BEは将来の利用状況を分析する",         correct: false },
            { text: "AS-ISはあるべき状態、TO-BEは現状を分析する",           correct: false },
            { text: "両者は同じ意味である",                                   correct: false }
        ],
        explanation: "AS-IS分析はユーザーが現在どのような方法で課題に対処しているかを把握し、TO-BE分析はユーザーが理想とする利用状況を想定します。この2つのギャップを埋めるのが設計です。"
    },
    {
        question: "ジョブ理論について、最も正しいのはどれですか？",
        options: [
            { text: "ユーザーの職業に基づくセグメンテーション",                                                                       correct: false },
            { text: "ユーザーが製品やサービスを使用する『目的』（ジョブ）に焦点を当てる。ユーザーが解決したい課題に基づくセグメンテーション", correct: true  },

        ],

    },
    {
        question: "KJ法について、最も正しいのはどれですか？",
        options: [
            { text: "インタビュー結果を分類・整理し、パターンを発見する手法", correct: true  },
            { text: "ユーザーのIQ測定法",                                     correct: false },
            { text: "定量調査の統計分析方法",                                 correct: false },
            { text: "カテゴリー化した情報をランキングする方法",               correct: false }
        ],
        explanation: "KJ法は、定性調査（特にインタビュー）の結果を分類・整理することで、共通のパターンやテーマを発見する手法です。インタビューデータの分析に広く使用されます。"

/* ═══════════════════════════════════════
   ENGINE
═══════════════════════════════════════ */
function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

let currentQuestion = 0;
let score = 0;
let correctAnswers = [];

/* ── 問題を描画 ── */
function renderQuestion() {
    if (currentQuestion >= quizData.length) { showScore(); return; }

    // ✅ 現在の問題データを先頭で取得
    const q        = quizData[currentQuestion];
    const shuffled = shuffleArray([...q.options]);

    correctAnswers[currentQuestion] = shuffled.findIndex(o => o.correct);

    const container = document.getElementById('quizContent');
    container.innerHTML = `
        <div class="quiz-question">
            <div class="question-text">Q${currentQuestion + 1}/${quizData.length}: ${q.question}</div>
            <div class="options" id="options"></div>
            <div class="explanation" id="explanation">
                <p id="explanationText"></p>
            </div>
            <div class="buttons">
                <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">回答する</button>
            </div>
        </div>`;

    const optionsEl = document.getElementById('options');
    shuffled.forEach((opt, idx) => {
        const label = document.createElement('label');
        label.className = 'option';
        label.innerHTML = `<input type="radio" name="answer" value="${idx}"> ${opt.text}`;
        label.addEventListener('click', () => {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            label.classList.add('selected');
        });
        optionsEl.appendChild(label);
    });

    updateProgress();
}

/* ── 回答を判定 ── */
function submitAnswer() {
    const selected = document.querySelector('input[name="answer"]:checked');
    if (!selected) { alert('選択肢を選んでください'); return; }

    // ✅ 現在の問題データを先頭で取得（TDZエラーを防ぐ）
    const q         = quizData[currentQuestion];
    const answerIdx = parseInt(selected.value);
    const isCorrect = answerIdx === correctAnswers[currentQuestion];

    if (isCorrect) score++;

    // ✅ 選択肢の色付け＆無効化
    document.querySelectorAll('.option').forEach((el, idx) => {
        el.classList.remove('selected');
        if (idx === correctAnswers[currentQuestion]) {
            el.classList.add('correct');
        } else if (idx === answerIdx && !isCorrect) {
            el.classList.add('incorrect');
        }
        const radio = el.querySelector('input');
        if (radio) radio.disabled = true;
    });

    // ✅ 解説を表示
    document.getElementById('explanation').classList.add('show');
    document.getElementById('explanationText').textContent = q.explanation;

    // ✅ 正解バッジを表示
    if (isCorrect) {
        const badge = document.createElement('div');
        badge.className = 'correct-feedback';
        badge.innerHTML = '✅ 正解です！';
        document.querySelector('.quiz-question').appendChild(badge);
    }

    // ✅ 回答ボタンを非表示にして次へボタンを追加
    document.getElementById('submitBtn').style.display = 'none';

    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-next';
    nextBtn.textContent = currentQuestion === quizData.length - 1 ? '結果を見る' : '次の問題へ';
    nextBtn.onclick = () => { currentQuestion++; renderQuestion(); };
    document.querySelector('.buttons').appendChild(nextBtn);
}

/* ── プログレスバー更新 ── */
function updateProgress() {
    const pct = ((currentQuestion + 1) / quizData.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
}

/* ── スコア画面 ── */
function showScore() {
    document.getElementById('quizContent').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';

    const pct = Math.round((score / quizData.length) * 100);
    document.getElementById('scoreNumber').textContent = pct + '%';

    let msg = '';
    if (pct === 100) {
        msg = '🎉 完璧です！\nUXリサーチとユーザー理解について完全に習得しました！\n素晴らしい理解度です。';
    } else if (pct >= 80) {
        msg = '✨ 素晴らしい！\nほぼ理解できています。\nW7に進む準備ができました。';
    } else if (pct >= 60) {
        msg = '👍 良好です！\n基本は理解できています。\n資料をもう一度確認してからW7に進みましょう。';
    } else {
        msg = '📚 もう一度挑戦！\nW6の資料を確認してから\nもう一度クイズに挑戦してください。';
    }
    document.getElementById('scoreMessage').textContent = msg;

    const navEl = document.getElementById('navButtons');
    navEl.innerHTML = '';

    const makeLink = (href, text) => {
        const a = document.createElement('a');
        a.className = 'nav-link';
        a.href = href;
        a.textContent = text;
        return a;
    };

    const makeRestart = () => {
        const btn = document.createElement('button');
        btn.className = 'btn-next';
        btn.style.background = 'linear-gradient(135deg, #f97316 0%, #ea580c 100%)';
        btn.textContent = '🔄 もう一度挑戦';
        btn.onclick = () => location.reload();
        return btn;
    };

    if (pct === 100) {
        navEl.appendChild(makeLink('w7_ux.html', '✅ W7へ進む'));
        navEl.appendChild(makeLink('index.html', '🏠 トップに戻る'));
    } else if (pct >= 80) {
        navEl.appendChild(makeLink('w7_ux.html', '✅ W7へ進む'));
        navEl.appendChild(makeLink('w6_ux.html', '📖 資料を確認'));
        navEl.appendChild(makeRestart());
        navEl.appendChild(makeLink('index.html', '🏠 トップに戻る'));
    } else {
        navEl.appendChild(makeLink('w6_ux.html', '📖 資料を確認'));
        navEl.appendChild(makeRestart());
        navEl.appendChild(makeLink('index.html', '🏠 トップに戻る'));
    }

    document.getElementById('scoreSection').classList.add('show');
}

/* ── 初期化 ── */
renderQuestion();
</script>
</body>
</html>
