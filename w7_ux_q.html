<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W7: クイズ - UXデザイン具現化 + 評価 + 運用・グロース</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,.2);
            overflow: hidden;
        }

        /* ─── Header ─── */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px;
            text-align: center;
        }

        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p  { opacity: .9; font-size: 1.1em; }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            transition: background 0.3s;
        }
        .back-link:hover { background: rgba(255,255,255,0.3); }

        /* ─── Progress ─── */
        .progress {
            background: #e0e0e0;
            height: 6px;
            margin: 20px 0;
        }

        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: .3s ease;
            width: 0%;
        }

        /* ─── Content ─── */
        .content { padding: 40px; }

        /* ─── Quiz Question ─── */
        .quiz-question {
            margin-bottom: 30px;
            animation: fadeIn .5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* ─── Options ─── */
        .options { display: grid; gap: 12px; }

        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: .3s ease;
            background: #f9f9f9;
        }

        .option:hover     { border-color: #667eea; background: #f0f4ff; }
        .option.selected  { border-color: #667eea; background: #e8eeff; }
        .option.correct   { border-color: #10b981; background: #d1fae5; }
        .option.incorrect { border-color: #ef4444; background: #fee2e2; }

        .option input {
            margin-right: 10px;
            cursor: pointer;
            accent-color: #667eea;
        }

        /* ─── Explanation ─── */
        .explanation {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: slideDown .3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .explanation p { color: #666; line-height: 1.8; }

        /* ─── Correct Feedback Badge ─── */
        .correct-feedback {
            background: #d1fae5;
            border: 2px solid #10b981;
            color: #059669;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            animation: slideDown .3s ease-out;
        }

        /* ─── Buttons ─── */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: .3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,.4);
        }

        .btn-next {
            background: #10b981;
            color: #fff;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16,185,129,.4);
        }

        /* ─── Score Section ─── */
        .score-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            display: none;
        }

        .score-section.show {
            display: block;
            animation: slideUp .5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .score-title   { font-size: 1.8em; margin-bottom: 10px; }
        .score-number  { font-size: 4em; font-weight: bold; margin: 15px 0; }
        .score-message { font-size: 1.3em; margin-top: 15px; line-height: 1.8; white-space: pre-line; }

        /* ─── Nav Buttons ─── */
        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: .3s ease;
        }

        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16,185,129,.4);
        }

        /* ─── Footer ─── */
        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e0e0e0;
        }

        /* ─── Responsive ─── */
        @media (max-width: 600px) {
            .content       { padding: 20px; }
            .header h1     { font-size: 1.5em; }
            .question-text { font-size: 1.1em; }
            .score-number  { font-size: 3em; }
        }
    </style>

/* ═══════════════════════════════════════
   ENGINE
═══════════════════════════════════════ */
function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

let currentQuestion = 0;
let score = 0;
let correctAnswers = [];

/* ── 問題を描画 ── */
function renderQuestion() {
    if (currentQuestion >= quizData.length) { showScore(); return; }

    // ✅ 現在の問題データを先頭で取得
    const q        = quizData[currentQuestion];
    const shuffled = shuffleArray([...q.options]);

    correctAnswers[currentQuestion] = shuffled.findIndex(o => o.correct);

    const container = document.getElementById('quizContent');
    container.innerHTML = `
        <div class="quiz-question">
            <div class="question-text">Q${currentQuestion + 1}/${quizData.length}: ${q.question}</div>
            <div class="options" id="options"></div>
            <div class="explanation" id="explanation">
                <p id="explanationText"></p>
            </div>
            <div class="buttons">
                <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">回答する</button>
            </div>
        </div>`;

    const optionsEl = document.getElementById('options');
    shuffled.forEach((opt, idx) => {
        const label = document.createElement('label');
        label.className = 'option';
        label.innerHTML = `<input type="radio" name="answer" value="${idx}"> ${opt.text}`;
        label.addEventListener('click', () => {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            label.classList.add('selected');
        });
        optionsEl.appendChild(label);
    });

    updateProgress();
}

/* ── 回答を判定 ── */
function submitAnswer() {
    const selected = document.querySelector('input[name="answer"]:checked');
    if (!selected) { alert('選択肢を選んでください'); return; }

    // ✅ 現在の問題データを先頭で取得（TDZエラーを防ぐ）
    const q         = quizData[currentQuestion];
    const answerIdx = parseInt(selected.value);
    const isCorrect = answerIdx === correctAnswers[currentQuestion];

    if (isCorrect) score++;

    // ✅ 選択肢の色付け＆無効化
    document.querySelectorAll('.option').forEach((el, idx) => {
        el.classList.remove('selected');
        if (idx === correctAnswers[currentQuestion]) {
            el.classList.add('correct');
        } else if (idx === answerIdx && !isCorrect) {
            el.classList.add('incorrect');
        }
        const radio = el.querySelector('input');
        if (radio) radio.disabled = true;
    });

    // ✅ 解説を表示
    document.getElementById('explanation').classList.add('show');
    document.getElementById('explanationText').textContent = q.explanation;

    // ✅ 正解バッジを表示
    if (isCorrect) {
        const badge = document.createElement('div');
        badge.className = 'correct-feedback';
        badge.innerHTML = '✅ 正解です！';
        document.querySelector('.quiz-question').appendChild(badge);
    }

    // ✅ 回答ボタンを非表示にして次へボタンを追加
    document.getElementById('submitBtn').style.display = 'none';

    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-next';
    nextBtn.textContent = currentQuestion === quizData.length - 1 ? '結果を見る' : '次の問題へ';
    nextBtn.onclick = () => { currentQuestion++; renderQuestion(); };
    document.querySelector('.buttons').appendChild(nextBtn);
}

/* ── プログレスバー更新 ── */
function updateProgress() {
    const pct = ((currentQuestion + 1) / quizData.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
}

/* ── スコア画面 ── */
function showScore() {
    document.getElementById('quizContent').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';

    const pct = Math.round((score / quizData.length) * 100);
    document.getElementById('scoreNumber').textContent = pct + '%';

    let msg = '';
    if (pct === 100) {
        msg = '🎉 完璧です！\nUX全体サイクルを完全に習得しました！\n7週間の学習、本当におめでとうございます！';
    } else if (pct >= 80) {
        msg = '✨ 素晴らしい！\nUX設計から評価・運用まで、全体像を理解しています。\n7週間の学習お疲れさまでした！';
    } else if (pct >= 60) {
        msg = '👍 良好です！\n基本は理解できています。\nW1〜W6の内容も復習して、理解を深めましょう。';
    } else {
        msg = '📚 もう一度挑戦！\nW7の資料を確認して、\nUX全体のサイクルを整理しましょう。';
    }
    document.getElementById('scoreMessage').textContent = msg;

    const navEl = document.getElementById('navButtons');
    navEl.innerHTML = '';

    const makeLink = (href, text) => {
        const a = document.createElement('a');
        a.className = 'nav-link';
        a.href = href;
        a.textContent = text;
        return a;
    };

    const makeRestart = () => {
        const btn = document.createElement('button');
        btn.className = 'btn-next';
        btn.style.background = 'linear-gradient(135deg, #f97316 0%, #ea580c 100%)';
        btn.textContent = '🔄 もう一度挑戦';
        btn.onclick = () => location.reload();
        return btn;
    };

    if (pct === 100) {
        navEl.appendChild(makeLink('index.html', '🏠 トップに戻る'));
    } else if (pct >= 80) {
        navEl.appendChild(makeLink('w7_ux.html', '📖 資料を確認'));
        navEl.appendChild(makeRestart());
        navEl.appendChild(makeLink('index.html', '🏠 トップに戻る'));
    } else {
        navEl.appendChild(makeLink('w7_ux.html', '📖 資料を確認'));
        navEl.appendChild(makeRestart());
        navEl.appendChild(makeLink('index.html', '🏠 トップに戻る'));
    }

    document.getElementById('scoreSection').classList.add('show');
}
