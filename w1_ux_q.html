<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W1: クイズ - UXとは</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:800px;margin:0 auto;background:#fff;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,.2);overflow:hidden}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:40px;text-align:center}
        .header h1{font-size:2em;margin-bottom:10px}
        .header p{opacity:.9;font-size:1.1em}
        .progress{background:#e0e0e0;height:6px;margin:20px 0}
        .progress-bar{background:linear-gradient(90deg,#667eea 0%,#764ba2 100%);height:100%;transition:.3s ease;width:0%}
        .content{padding:40px}
        .quiz-question{margin-bottom:30px;animation:fadeIn .5s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .question-text{font-size:1.2em;font-weight:bold;color:#333;margin-bottom:20px;line-height:1.6}
        .options{display:grid;gap:12px}
        .option{padding:15px;border:2px solid #ddd;border-radius:8px;cursor:pointer;transition:.3s ease;background:#f9f9f9}
        .option:hover{border-color:#667eea;background:#f0f4ff}
        .option input{margin-right:10px;cursor:pointer}
        .option.selected{border-color:#667eea;background:#e8eeff}
        .option.correct{border-color:#10b981;background:#d1fae5}
        .option.incorrect{border-color:#ef4444;background:#fee2e2}
        .explanation{background:#f3f4f6;padding:20px;border-radius:8px;margin-top:20px;border-left:4px solid #667eea;display:none}
        .explanation.show{display:block;animation:slideDown .3s ease-out}
        @keyframes slideDown{from{opacity:0;height:0}to{opacity:1;height:auto}}
        .explanation p{color:#666;line-height:1.8}
        .buttons{display:flex;gap:15px;margin-top:30px;justify-content:center;flex-wrap:wrap}
        button{padding:12px 30px;border:none;border-radius:8px;font-size:1em;font-weight:bold;cursor:pointer;transition:.3s ease}
        .btn-submit{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(102,126,234,.4)}
        .btn-next{background:#10b981;color:#fff}
        .btn-next:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(16,185,129,.4)}
        .score-section{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:40px;border-radius:15px;text-align:center;margin-bottom:30px;display:none}
        .score-section.show{display:block;animation:slideUp .5s ease-out}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .score-number{font-size:4em;font-weight:bold;margin:15px 0}
        .score-message{font-size:1.3em;margin-top:15px;line-height:1.8}
        .nav-buttons{display:flex;gap:15px;justify-content:center;margin-top:25px;flex-wrap:wrap}
        .nav-link{display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff;text-decoration:none;border-radius:8px;font-weight:bold;transition:.3s ease}
        .nav-link:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(16,185,129,.4)}
        .back-link{display:inline-block;margin-bottom:20px;color:#667eea;text-decoration:none;font-weight:bold}
        .back-link:hover{text-decoration:underline}
        .correct-feedback{background:#d1fae5;border:2px solid #10b981;color:#059669;padding:15px;border-radius:8px;margin-top:15px;font-weight:bold;text-align:center;animation:slideDown .3s ease-out}
        @media(max-width:600px){.content{padding:20px}.header h1{font-size:1.5em}.question-text{font-size:1.1em}.score-number{font-size:3em}}
    </style>
</head>
<body>
<div class="container">
<div class="header">
<a href="index.html" class="back-link">← トップに戻る</a>
<h1>W1: クイズ</h1>
<p>UXとは - 理解度チェック</p>
</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div class="content">
<div class="score-section" id="scoreSection">
<div style="font-size:1.8em;margin-bottom:10px">クイズ完了！</div>
<div class="score-number" id="scoreNumber">0%</div>
<div class="score-message" id="scoreMessage"></div>
<div class="nav-buttons" id="navButtons"></div>
</div>
<div id="quizContent"></div>
</div>
</div>
<script>
const quizData=[
  {
    question:"UXとは何ですか？",
    options:[
      {text:"製品・サービスとの相互作用を通じてユーザーが得る体験の総体",correct:true},
      {text:"視覚的に美しく直感的に操作できるUIを設計・実装するための方法論",correct:false},
      {text:"ユーザーの行動データを収集・分析してコンバージョン率を最適化する手法",correct:false},
      {text:"顧客満足度調査をもとにサービス品質を数値化・管理するフレームワーク",correct:false}
    ],
    explanation:"UX（ユーザーエクスペリエンス）は、ユーザーが製品やサービスと相互作用する際に得るすべての体験を指します。UIデザインやコンバージョン最適化はUXの一側面に過ぎません。"
  },
  {
    question:"UXハニカム構造の中央に位置する要素は何ですか？",
    options:[
      {text:"価値",correct:true},
      {text:"有用性（製品がユーザーの目的達成を支援する機能的側面）",correct:false},
      {text:"信頼性（情報の正確さやブランドへの安心感を担保する要素）",correct:false},
      {text:"見つけやすさ（情報アーキテクチャとナビゲーション設計に関わる要素）",correct:false}
    ],
    explanation:"ハニカム構造の中央には『価値』が位置し、その周りに6つの要素（有用性、使いやすさ、好ましさ、見つけやすさ、アクセス性、信頼性）が配置されます。"
  },
  {
    question:"UXハニカム構造の7つの要素に含まれないものはどれですか？",
    options:[
      {text:"人気度",correct:true},
      {text:"好ましさ（ブランドや感情的な魅力に関わる要素）",correct:false},
      {text:"アクセス性（障がいの有無に関わらず利用できる度合い）",correct:false},
      {text:"見つけやすさ（コンテンツや機能に到達しやすい設計）",correct:false}
    ],
    explanation:"ハニカム構造の7要素は：有用性、使いやすさ、好ましさ、見つけやすさ、アクセス性、信頼性、価値です。人気度はこれらに含まれません。"
  },
  {
    question:"UIとUXの関係について、正しい説明はどれですか？",
    options:[
      {text:"UIはUXの一部であり、UXはより広い体験全体を包含する",correct:true},
      {text:"UXはUIの視覚表現を定義し、UIはUXの技術的実装を担う",correct:false},
      {text:"UIとUXはどちらもビジュアルデザインを指し、実質的に同義である",correct:false},
      {text:"UXはマーケティング戦略に属し、UIはエンジニアリングの領域である",correct:false}
    ],
    explanation:"UI（ユーザーインターフェース）はUX（ユーザーエクスペリエンス）の重要な構成要素ですが、UXはUIを超えた広い体験概念です。両者を同義とする理解は誤りです。"
  },
  {
    question:"DX（デジタルトランスフォーメーション）とUXの主な違いは何ですか？",
    options:[
      {text:"DXは組織・ビジネスモデル全体の変革、UXは個々のユーザー体験の向上",correct:true},
      {text:"DXはユーザー接点のデジタル化、UXはアナログ体験の設計を指す",correct:false},
      {text:"DXはIT部門が主導し、UXはデザイン部門だけが担う独立した活動である",correct:false},
      {text:"DXは短期的なシステム導入施策、UXは長期的なブランド戦略を意味する",correct:false}
    ],
    explanation:"DXは企業全体のビジネスモデルやプロセスをデジタル化・変革することを指します。UXはユーザーの体験改善に焦点を当てており、DXの中にUX改善が含まれることもあります。"
  },
  {
    question:"CX（カスタマーエクスペリエンス）がUXと異なる最大の特徴は何ですか？",
    options:[
      {text:"CXは認知から購入後サポートまでカスタマージャーニー全体が対象",correct:true},
      {text:"CXはデジタル製品に特化し、UXは実店舗などオフライン体験を扱う",correct:false},
      {text:"CXはNPSなどの定量指標のみで評価され、UXは定性調査が中心である",correct:false},
      {text:"CXはマーケティング部門が独占的に管理し、UXは開発チームが担う",correct:false}
    ],
    explanation:"CXはカスタマージャーニー全体（すべての接触点）を対象としますが、UXは特定の製品やサービスとの相互作用に焦点を当てています。"
  },
  {
    question:"UXが重視されるようになった背景として、正しくないものはどれですか？",
    options:[
      {text:"すべての企業がすでにUXを標準的に実践・内製化している",correct:true},
      {text:"機能的な差別化が難しくなり、体験品質が競争優位の源泉になった",correct:false},
      {text:"スマートフォン普及によりユーザーの期待水準が大幅に上昇した",correct:false},
      {text:"ユーザーが製品を切り替えるコストが下がり、離脱が起きやすくなった",correct:false}
    ],
    explanation:"UXへの注目は市場環境の変化やユーザー期待の高まりから生じましたが、すべての企業がUXを実践・内製化しているわけではなく、取り組みには大きな格差があります。"
  },
  {
    question:"アフターデジタル時代におけるUXの役割として最も適切なものはどれですか？",
    options:[
      {text:"オンライン・オフラインの境界を超えた全接触点での一貫した体験設計",correct:true},
      {text:"ECサイトや公式アプリなどデジタルチャネルの最適化に集中する",correct:false},
      {text:"リアル店舗の体験を廃止し、すべてのサービスをデジタルへ移行する",correct:false},
      {text:"データ収集の効率化を最優先し、プライバシーよりも分析精度を重視する",correct:false}
    ],
    explanation:"アフターデジタル時代はオンラインとオフラインの境界がなくなり、どの接触点でも一貫したユーザー体験の設計が求められています。デジタルだけに特化するのは誤りです。"
  },
  {
    question:"UXデザインプロセスの正しい順序はどれですか？",
    options:[
      {text:"リサーチ → 要件定義 → 設計 → 評価 → 改善",correct:true},
      {text:"要件定義 → 設計 → リサーチ → 改善 → 評価",correct:false},
      {text:"設計 → プロトタイプ → リサーチ → 要件定義 → 評価",correct:false},
      {text:"評価 → 改善 → 設計 → リサーチ → 要件定義",correct:false}
    ],
    explanation:"UXデザインプロセスはユーザーリサーチから始まり、要件定義・設計・評価・改善というサイクルで進みます。設計よりリサーチを先行させることが重要です。"
  },
  {
    question:"ユーザーの潜在ニーズを引き出す方法として最も適切なものはどれですか？",
    options:[
      {text:"インタビューや観察による定性調査で行動・文脈を深く理解する",correct:true},
      {text:"大規模アンケートで統計的有意差を確認し数値で潜在ニーズを特定する",correct:false},
      {text:"競合他社の機能を網羅的にベンチマークし差分をニーズとして定義する",correct:false},
      {text:"過去の購買データをAIで分析し、顕在化した行動パターンから推論する",correct:false}
    ],
    explanation:"潜在ニーズはユーザー自身も言語化できていないことが多いため、インタビューや観察などの定性リサーチが有効です。定量データだけでは表面的な行動しか把握できません。"
  },
  {
    question:"反復的なデザインアプローチ（イテレーション）の主な利点は何ですか？",
    options:[
      {text:"ユーザーフィードバックをもとに問題を早期発見し継続的に改善できる",correct:true},
      {text:"開発初期に完全な仕様を確定できるため、手戻りコストをゼロにできる",correct:false},
      {text:"デザイナーの主観的判断を排除し、すべての意思決定をデータに委ねられる",correct:false},
      {text:"ステークホルダーへの承認プロセスを省略でき、リリースを大幅に短縮できる",correct:false}
    ],
    explanation:"反復的アプローチの最大の利点は、ユーザーフィードバックを受けながら問題を早期に発見・修正できる点です。完璧な仕様を最初から確定することを目指す手法ではありません。"
  },
  {
    question:"UXを適切に評価するために重要な指標はどれですか？",
    options:[
      {text:"ユーザー満足度・タスク完了率・エラー率・完了時間などの複合指標",correct:true},
      {text:"月間アクティブユーザー数とページビュー数の2指標で十分である",correct:false},
      {text:"デザイン賞の受賞数や専門家による審美的評価スコアが最も信頼性が高い",correct:false},
      {text:"売上・CVRなどビジネス指標のみがUX改善の効果を正確に示す",correct:false}
    ],
    explanation:"UX評価にはユーザー満足度・タスク完了率・エラー率・所要時間など複数の観点が必要です。単一の指標や審美的評価だけでは体験の質を正確に把握できません。"
  },
  {
    question:"初期段階のユーザーテストで一般的に推奨される最小サンプルサイズはどれですか？",
    options:[
      {text:"5人程度（主要な問題の大半を発見できるとされる）",correct:true},
      {text:"1人でも十分（テスト実施自体に意義があるため人数は問わない）",correct:false},
      {text:"50人以上（統計的有意性を担保するために必要な最低ライン）",correct:false},
      {text:"100人以上（定量的なUX指標を算出するための標準的な要件）",correct:false}
    ],
    explanation:"初期ユーザーテストでは5人程度で主要な問題の85%程度が発見できるとされています。多人数が必要なのは定量的な統計分析を行う場合であり、初期の発見目的では5人が費用対効果の高い目安です。"
  }
];

function shuffleArray(e){const t=[...e];for(let e=t.length-1;e>0;e--){const n=Math.floor(Math.random()*(e+1));[t[e],t[n]]=[t[n],t[e]]}return t}

let currentQuestion=0,score=0,correctAnswers=[];

function renderQuestion(){if(currentQuestion<quizData.length){const e=quizData[currentQuestion],t=shuffleArray([...e.options]);correctAnswers[currentQuestion]=t.findIndex(e=>e.correct);const n=document.getElementById("quizContent");n.innerHTML=`<div class="quiz-question"><div class="question-text">Q${currentQuestion+1}/${quizData.length}: ${e.question}</div><div class="options" id="options"></div><div class="explanation" id="explanation"><p id="explanationText"></p></div><div class="buttons"><button class="btn-submit" onclick="submitAnswer()" style="display:block">回答する</button></div></div>`;const i=document.getElementById("options");t.forEach((e,a)=>{const s=document.createElement("label");s.className="option",s.innerHTML=`<input type="radio" name="answer" value="${a}"> ${e.text}`,s.addEventListener("click",()=>s.classList.toggle("selected")),i.appendChild(s)}),updateProgress()}else{showScore()}}

function submitAnswer(){const e=document.querySelector('input[name="answer"]:checked');if(!e)return void alert("選択肢を選んでください");const t=parseInt(e.value),n=t===correctAnswers[currentQuestion];n?score++:0;const i=document.querySelectorAll(".option");if(i.forEach((e,a)=>{e.classList.remove("selected"),a===correctAnswers[currentQuestion]?e.classList.add("correct"):a===t&&!n&&e.classList.add("incorrect")}),document.getElementById("explanation").classList.add("show"),document.getElementById("explanationText").textContent=quizData[currentQuestion].explanation,document.querySelector(".btn-submit").style.display="none",n){const e=document.createElement("div");e.className="correct-feedback",e.innerHTML="✅ 正解です！",document.querySelector(".quiz-question").appendChild(e)}const a=document.querySelector(".buttons");if(currentQuestion===quizData.length-1){const e=document.createElement("button");e.className="btn-next",e.textContent="結果を見る",e.onclick=()=>showScore(),a.appendChild(e)}else{const e=document.createElement("button");e.className="btn-next",e.textContent="次の問題へ",e.onclick=()=>nextQuestion(),a.appendChild(e)}}

function nextQuestion(){currentQuestion++,renderQuestion()}

function updateProgress(){const e=((currentQuestion+1)/(quizData.length))*100;document.getElementById("progressBar").style.width=e+"%"}

function showScore(){const e=Math.round((score/quizData.length)*100),t=document.getElementById("scoreSection");document.getElementById("scoreNumber").textContent=e+"%",document.getElementById("quizContent").style.display="none";let n="";100===e?n="🎉 完璧です！\n全問正解です！\n素晴らしい理解度です。":80<=e?n="✨ 素晴らしい！\nほぼ理解できています。\nW2に進む準備ができました。":60<=e?n="👍 良好です！\n基本は理解できています。\n資料をもう一度確認してからW2に進みましょう。":n="📚 もう一度挑戦！\n資料を確認してから\nもう一度クイズに挑戦してください。",document.getElementById("scoreMessage").textContent=n;const i=document.getElementById("navButtons");if(i.innerHTML="",100===e){const e=document.createElement("a");e.className="nav-link",e.href="w2_ux.html",e.textContent="✅ W2へ進む",i.appendChild(e);const a=document.createElement("a");a.className="nav-link",a.href="index.html",a.textContent="🏠 トップに戻る",i.appendChild(a)}else if(80<=e){const e=document.createElement("a");e.className="nav-link",e.href="w2_ux.html",e.textContent="✅ W2へ進む",i.appendChild(e);const a=document.createElement("a");a.className="nav-link",a.href="w1_ux.html",a.textContent="📖 資料を確認",i.appendChild(a);const s=document.createElement("a");s.className="nav-link",s.href="index.html",s.textContent="🏠 トップに戻る",i.appendChild(s)}else{const e=document.createElement("button");e.className="btn-next",e.style.background="linear-gradient(135deg, #f97316 0%, #ea580c 100%)",e.textContent="もう一度挑戦",e.onclick=()=>{location.reload()},i.appendChild(e);const a=document.createElement("a");a.className="nav-link",a.href="w1_ux.html",a.textContent="📖 資料を確認",i.appendChild(a);const s=document.createElement("a");s.className="nav-link",s.href="index.html",s.textContent="🏠 トップに戻る",i.appendChild(s)}t.classList.add("show"),updateProgress()}

renderQuestion();
</script>
</body>
</html>
