<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W3: クイズ - Human-Centered Design + Design Thinking</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:800px;margin:0 auto;background:#fff;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,.2);overflow:hidden}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:40px;text-align:center}
        .header h1{font-size:2em;margin-bottom:10px}
        .header p{opacity:.9;font-size:1.1em}
        .progress{background:#e0e0e0;height:6px;margin:20px 0}
        .progress-bar{background:linear-gradient(90deg,#667eea 0%,#764ba2 100%);height:100%;transition:.3s ease;width:0%}
        .content{padding:40px}
        .quiz-question{margin-bottom:30px;animation:fadeIn .5s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .question-text{font-size:1.2em;font-weight:bold;color:#333;margin-bottom:20px;line-height:1.6}
        .options{display:grid;gap:12px}
        .option{padding:15px;border:2px solid #ddd;border-radius:8px;cursor:pointer;transition:.3s ease;background:#f9f9f9}
        .option:hover{border-color:#667eea;background:#f0f4ff}
        .option input{margin-right:10px;cursor:pointer}
        .option.selected{border-color:#667eea;background:#e8eeff}
        .option.correct{border-color:#10b981;background:#d1fae5;border-width:3px}
        .option.incorrect{border-color:#ef4444;background:#fee2e2;border-width:3px}
        .explanation{background:#f3f4f6;padding:20px;border-radius:8px;margin-top:20px;border-left:4px solid #667eea;display:none}
        .explanation.show{display:block;animation:slideDown .3s ease-out}
        @keyframes slideDown{from{opacity:0;height:0}to{opacity:1;height:auto}}
        .explanation p{color:#666;line-height:1.8}
        .buttons{display:flex;gap:15px;margin-top:30px;justify-content:center;flex-wrap:wrap}
        button{padding:12px 30px;border:none;border-radius:8px;font-size:1em;font-weight:bold;cursor:pointer;transition:.3s ease}
        .btn-submit{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(102,126,234,.4)}
        .btn-next{background:#10b981;color:#fff}
        .btn-next:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(16,185,129,.4)}
        .score-section{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:40px;border-radius:15px;text-align:center;margin-bottom:30px;display:none}
        .score-section.show{display:block;animation:slideUp .5s ease-out}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .score-number{font-size:4em;font-weight:bold;margin:15px 0}
        .score-message{font-size:1.3em;margin-top:15px;line-height:1.8}
        .nav-buttons{display:flex;gap:15px;justify-content:center;margin-top:25px;flex-wrap:wrap}
        .nav-link{display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff;text-decoration:none;border-radius:8px;font-weight:bold;transition:.3s ease}
        .nav-link:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(16,185,129,.4)}
        .back-link{display:inline-block;margin-bottom:20px;color:#667eea;text-decoration:none;font-weight:bold}
        .back-link:hover{text-decoration:underline}
        .correct-feedback{background:#d1fae5;border:3px solid #10b981;color:#059669;padding:20px;border-radius:12px;margin-top:20px;font-weight:bold;text-align:center;animation:slideDown .3s ease-out;font-size:1.1em}
        .correct-feedback:before{content:"✅ ";margin-right:10px}
        @media(max-width:600px){.content{padding:20px}.header h1{font-size:1.5em}.question-text{font-size:1.1em}.score-number{font-size:3em}}
    </style>
</head>
<body>
<div class="container">
<div class="header">
<a href="index.html" class="back-link">← トップに戻る</a>
<h1>W3: クイズ</h1>
<p>Human-Centered Design + Design Thinking - 理解度チェック</p>
</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div class="content">
<div class="score-section" id="scoreSection">
<div style="font-size:1.8em;margin-bottom:10px">クイズ完了！</div>
<div class="score-number" id="scoreNumber">0%</div>
<div class="score-message" id="scoreMessage"></div>
<div class="nav-buttons" id="navButtons"></div>
</div>
<div id="quizContent"></div>
</div>
</div>
<script>
const quizData=[
{question:"HCDの最初のステップは何ですか？",options:[{text:"背景とニーズの理解",correct:!0},{text:"デザイン解決策の作成",correct:!1},{text:"デザインの評価",correct:!1},{text:"要件の指定",correct:!1}],explanation:"HCDはユーザーを理解することから始まります。ユーザーリサーチを通じて、行動、ニーズ、課題を深く理解することが重要です。"},
{question:"Design Thinkingの5つのステップの正しい順序はどれですか？",options:[{text:"共感→問題定義→創造→プロトタイピング→テスト",correct:!0},{text:"問題定義→共感→創造→テスト→プロトタイピング",correct:!1},{text:"創造→共感→問題定義→プロトタイピング→テスト",correct:!1},{text:"プロトタイピング→テスト→共感→問題定義→創造",correct:!1}],explanation:"Design Thinkingは常にユーザーへの共感から始まります。その後、問題を定義し、アイデアを創造し、プロトタイプを作成して、テストするという順序です。"},
{question:"Design Thinkingにおいて『共感（Empathize）』のステップで最も重要なことは何ですか？",options:[{text:"ユーザーの立場に立って、行動、感情、動機を深く理解すること",correct:!0},{text:"できるだけ多くのユーザーのデータを集めること",correct:!1},{text:"デザイナーの直感的な判断を信頼すること",correct:!1},{text:"市場調査レポートを読むこと",correct:!1}],explanation:"共感ステップは、単なる情報収集ではなく、ユーザーの気持ちや動機を深く理解することです。これが後続のすべてのステップの基盤になります。"},
{question:"HCDにおける『問題定義』ステップで求められることは何ですか？",options:[{text:"表面的な課題ではなく、ユーザーが本当に抱えている根本的な問題を明確にすること",correct:!0},{text:"企業が提供したい機能を定義すること",correct:!1},{text:"競合他社の問題点を指摘すること",correct:!1},{text:"できるだけ多くの問題を見つけること",correct:!1}],explanation:"問題定義で最も重要なのは、『なぜ？』を繰り返して、表面的な課題の奥にある根本的な問題を発見することです。"},
{question:"プロトタイピングの最大の価値は何ですか？",options:[{text:"低解像度のプロトタイプから始めることで、快速にアイデアを形にし、ユーザーからの早期フィードバックを得られること",correct:!0},{text:"完璧な製品を最初から作成すること",correct:!1},{text:"デザイナーの時間を節約すること",correct:!1},{text:"開発コストを削減すること",correct:!1}],explanation:"プロトタイピングは『失敗から学ぶ』ことを可能にします。完璧さより、早期のフィードバック収集が重要です。"},
{question:"ペルソナとは何ですか？",options:[{text:"リサーチ結果に基づいて作成した、代表的なユーザー像",correct:!0},{text:"実在するユーザーの個人情報",correct:!1},{text:"ターゲット市場のセグメント",correct:!1},{text:"競合他社の顧客",correct:!1}],explanation:"ペルソナは、リサーチ結果から抽出した典型的なユーザー像です。設計チーム全体で同じイメージのユーザーを共有するのに効果的です。"},
{question:"ユーザージャーニーマップの主な目的は何ですか？",options:[{text:"ユーザーが製品やサービスと接する全ての接点を可視化し、各段階での感情や課題を把握すること",correct:!0},{text:"営業ルートを最適化すること",correct:!1},{text:"顧客の物理的な移動を追跡すること",correct:!1},{text:"製品の配送経路を計画すること",correct:!1}],explanation:"ユーザージャーニーマップは、購入前から購入後まで、ユーザーが経験するあらゆる接点での感情や課題を理解するツールです。"},
{question:"HCDとDesign Thinkingの最大の違いは何ですか？",options:[{text:"HCDは標準化された体系的プロセス、Design Thinkingはより創造的で柔軟な思考法",correct:!0},{text:"HCDはビジネス用、Design Thinkingは学術用",correct:!1},{text:"HCDはヨーロッパ、Design Thinkingはアメリカ発祥",correct:!1},{text:"HCDはデザイナー向け、Design Thinkingは全員向け",correct:!1}],explanation:"HCDはISO 9241-210で標準化された公式プロセスであり、Design Thinkingはそこにより多くの創造性と柔軟性を加えた思考法です。"},
{question:"ブレインストーミングにおいて最も重要なルールは何ですか？",options:[{text:"アイデアの良い悪いを判断せず、自由に発想を出し合うこと",correct:!0},{text:"各アイデアを即座に評価して実現可能性を確認すること",correct:!1},{text:"現実的で実装可能なアイデアのみを提案すること",correct:!1},{text:"既に存在する解決策を参考にすること",correct:!1}],explanation:"ブレインストーミングの成功は、判断を後回しにして、自由で広い思考を許容することにあります。これが多くの創造的なアイデアを生み出します。"},
{question:"ユーザーテストにおいて、最も価値のあるフィードバックはどのような場合ですか？",options:[{text:"ユーザーが予想外の使い方をしたり、課題を見つけたりする場合",correct:!0},{text:"ユーザーが設計者の想定通りに製品を使う場合",correct:!1},{text:"ユーザーが全てのフィーチャーを褒める場合",correct:!1},{text:"ユーザーが特に意見を言わない場合",correct:!1}],explanation:"設計者の予想を外れた行動や課題発見こそが、最も価値のあるフィードバックです。これによって初めて改善の方向が見えます。"},
{question:"HCDのプロセスにおいて『反復的な改善』がなぜ重要なのですか？",options:[{text:"ユーザーテストを通じて新しい気づきが生まれるたびに、設計を改善することで、最適な解決策に近づくから",correct:!0},{text:"時間をかけることで、より高級な製品を作れるから",correct:!1},{text:"開発チームのスキルを高めるため",correct:!1},{text:"プロジェクト予算を正当化するため",correct:!1}],explanation:"反復的改善により、ユーザーからの継続的なフィードバックに基づいて、段階的に設計の品質を向上させることができます。"}
];

function shuffleArray(e){const t=[...e];for(let e=t.length-1;e>0;e--){const n=Math.floor(Math.random()*(e+1));[t[e],t[n]]=[t[n],t[e]]}return t}

let currentQuestion=0,score=0,correctAnswers=[];

function renderQuestion(){if(currentQuestion<quizData.length){const e=quizData[currentQuestion],t=shuffleArray([...e.options]);correctAnswers[currentQuestion]=t.findIndex(e=>e.correct);const n=document.getElementById("quizContent");n.innerHTML=`<div class="quiz-question"><div class="question-text">Q${currentQuestion+1}/${quizData.length}: ${e.question}</div><div class="options" id="options"></div><div class="explanation" id="explanation"><p id="explanationText"></p></div><div class="buttons"><button class="btn-submit" onclick="submitAnswer()" style="display:block">回答する</button></div></div>`;const i=document.getElementById("options");t.forEach((e,a)=>{const s=document.createElement("label");s.className="option",s.innerHTML=`<input type="radio" name="answer" value="${a}"> ${e.text}`,s.addEventListener("click",()=>s.classList.toggle("selected")),i.appendChild(s)}),updateProgress()}else{showScore()}}

function submitAnswer(){const e=document.querySelector('input[name="answer"]:checked');if(!e)return void alert("選択肢を選んでください");const t=parseInt(e.value),n=t===correctAnswers[currentQuestion];n?score++:0;const i=document.querySelectorAll(".option");if(i.forEach((e,a)=>{e.classList.remove("selected"),a===correctAnswers[currentQuestion]?e.classList.add("correct"):a===t&&!n&&e.classList.add("incorrect")}),document.getElementById("explanation").classList.add("show"),document.getElementById("explanationText").textContent=quizData[currentQuestion].explanation,document.querySelector(".btn-submit").style.display="none",n){const e=document.createElement("div");e.className="correct-feedback",e.innerHTML="正解です！",document.querySelector(".quiz-question").appendChild(e)}const a=document.querySelector(".buttons");if(currentQuestion===quizData.length-1){const e=document.createElement("button");e.className="btn-next",e.textContent="結果を見る",e.onclick=()=>showScore(),a.appendChild(e)}else{const e=document.createElement("button");e.className="btn-next",e.textContent="次の問題へ",e.onclick=()=>nextQuestion(),a.appendChild(e)}}

function nextQuestion(){currentQuestion++,renderQuestion()}

function updateProgress(){const e=((currentQuestion+1)/(quizData.length))*100;document.getElementById("progressBar").style.width=e+"%"}

function showScore(){const e=Math.round((score/quizData.length)*100),t=document.getElementById("scoreSection");document.getElementById("scoreNumber").textContent=e+"%",document.getElementById("quizContent").style.display="none";let n="";100===e?n="🎉 完璧です！\n全問正解です！\n素晴らしい理解度です。":80<=e?n="✨ 素晴らしい！\nほぼ理解できています。\nW4に進む準備ができました。":60<=e?n="👍 良好です！\n基本は理解できています。\n資料をもう一度確認してからW4に進みましょう。":n="📚 もう一度挑戦！\n資料を確認してから\nもう一度クイズに挑戦してください。",document.getElementById("scoreMessage").textContent=n;const i=document.getElementById("navButtons");if(i.innerHTML="",100===e){const e=document.createElement("a");e.className="nav-link",e.href="w4_ux.html",e.textContent="✅ W4へ進む",i.appendChild(e);const a=document.createElement("a");a.className="nav-link",a.href="index.html",a.textContent="🏠 トップに戻る",i.appendChild(a)}else if(80<=e){const e=document.createElement("a");e.className="nav-link",e.href="w4_ux.html",e.textContent="✅ W4へ進む",i.appendChild(e);const a=document.createElement("a");a.className="nav-link",a.href="w3_ux.html",a.textContent="📖 資料を確認",i.appendChild(a);const s=document.createElement("a");s.className="nav-link",s.href="index.html",s.textContent="🏠 トップに戻る",i.appendChild(s)}else{const e=document.createElement("button");e.className="btn-next",e.style.background="linear-gradient(135deg, #f97316 0%, #ea580c 100%)",e.textContent="もう一度挑戦",e.onclick=()=>{location.reload()},i.appendChild(e);const a=document.createElement("a");a.className="nav-link",a.href="w3_ux.html",a.textContent="📖 資料を確認",i.appendChild(a);const s=document.createElement("a");s.className="nav-link",s.href="index.html",s.textContent="🏠 トップに戻る",i.appendChild(s)}t.classList.add("show"),updateProgress()}

renderQuestion();
</script>
</body>
</html>
